<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – GharFix Pakistan</title>
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toast"></div>
  
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">GharFix.pk</a>
      <button class="theme-toggle" id="themeToggle">🌓</button>
    </div>
  </nav>
  
  <main style="min-height: calc(100vh - 200px); display: flex; align-items: center; justify-content: center; padding: 4rem 2rem;">
    <div class="card" style="max-width: 450px; width: 100%; padding: 3rem; border: 2px solid var(--primary);">
      <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary);">Welcome Back</h2>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required>
        </div>
        
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
            <button type="button" class="password-toggle">👁️</button>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          <span class="btn-text">Login</span>
          <span class="loading hidden"></span>
        </button>
      </form>
      
      <p style="text-align: center; margin-top: 1.5rem;">
        <a href="forgot-password.html" style="color: var(--accent);">Forgot password?</a>
      </p>
      
      <p style="text-align: center; margin-top: 1rem; color: var(--text-sec);">
        Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 600;">Sign up</a>
      </p>
    </div>
  </main>
  
  <script type="module">
    import { auth, signInWithEmailAndPassword } from './firebase.js';
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = e.target.querySelector('button[type="submit"]');
      const btnText = btn.querySelector('.btn-text');
      const loading = btn.querySelector('.loading');
      
      btn.disabled = true;
      btnText.classList.add('hidden');
      loading.classList.remove('hidden');
      
      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.showToast('Login successful! Redirecting...', 'success');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
      } catch (error) {
        console.error('Login error:', error);
        const messages = {
          'auth/invalid-email': 'Invalid email address',
          'auth/user-not-found': 'No account found with this email',
          'auth/wrong-password': 'Incorrect password',
          'auth/invalid-credential': 'Invalid email or password'
        };
        window.showToast(messages[error.code] || 'Login failed. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btnText.classList.remove('hidden');
        loading.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
