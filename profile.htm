<!-- Dashboard-style page with profile form -->
<form id="profileForm" class="form">
  <div class="form-group">
    <label>Profile Photo</label>
    <input type="file" id="profilePhoto" class="form-control" accept="image/*">
  </div>
  <div class="form-group">
    <label>Full Name</label>
    <input type="text" id="profileName" class="form-control" required>
  </div>
  <div class="form-group">
    <label>Phone</label>
    <input type="tel" id="profilePhone" class="form-control" placeholder="+92 3XX XXXXXXX">
  </div>
  <div class="form-group">
    <label>Location</label>
    <input type="text" id="profileLocation" class="form-control" placeholder="City, Pakistan">
  </div>
  <button type="submit" class="btn btn-primary">Save Changes</button>
</form>
